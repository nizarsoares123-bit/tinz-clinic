<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TINZ Clinic - Assistente</title>
    <style>
        body { font-family: sans-serif; background-color: #CCFBF1; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { background: #14B8A6; color: white; padding: 15px; text-align: center; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; }
        .user { background: #14B8A6; color: white; align-self: flex-end; }
        .ai { background: white; align-self: flex-start; border: 1px solid #14B8A6; }
        #input-area { padding: 20px; background: white; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #14B8A6; border-radius: 5px; }
        button { background: #14B8A6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <header><h2>TINZ Clinic</h2></header>
    <div id="chat"></div>
    <div id="input-area">
        <input type="text" id="msgInput" placeholder="Digite sua mensagem...">
        <button onclick="enviar()">Enviar</button>
    </div>

    <script>
        async function enviar() {
            const input = document.getElementById('msgInput');
            const chat = document.getElementById('chat');
            const texto = input.value.trim();
            if (!texto) return;

            // 1. SUA CHAVE AQUI (Gere uma NOVA no AI Studio agora!)
            const MINHA_CHAVE = "AIzaSyBN-xemSmrpDSQtda9-2rpeTxSADTwxaVc"; 

            chat.innerHTML += `<div class="msg user">${texto}</div>`;
            input.value = '';

            try {
                // USANDO A URL DIRETA (Isso evita o Erro 404 das bibliotecas)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MINHA_CHAVE}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: texto }] }] })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                const respostaIA = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="msg ai">${respostaIA}</div>`;
            } catch (e) {
                console.error(e);
                chat.innerHTML += `<div class="msg ai">Erro: ${e.message}</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
