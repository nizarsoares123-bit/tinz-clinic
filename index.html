<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TINZ Clinic - Oficial</title>
    <style>
        :root { --primaria: #14B8A6; --secundaria: #CCFBF1; --destaque: #5EEAD4; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--secundaria); margin: 0; display: flex; flex-direction: column; height: 100vh; color: #333; }
        header { background: var(--primaria); color: white; padding: 15px; text-align: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.4; font-size: 16px; }
        .user { background: var(--primaria); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: white; color: #333; align-self: flex-start; border: 1px solid var(--primaria); border-bottom-left-radius: 2px; }
        #input-area { padding: 15px; background: white; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; padding-left: 20px; }
        button { background: var(--destaque); color: #0f766e; border: none; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: var(--primaria); color: white; }
    </style>
</head>
<body>
    <header>TINZ Clinic - Assistência Profissional</header>
    <div id="chat">
        <div class="msg ai">Olá! Sou o assistente da TINZ Clinic. Como posso ajudar você hoje?</div>
    </div>
    <div id="input-area">
        <input type="text" id="msgInput" placeholder="Digite sua mensagem..." onkeypress="if(event.key==='Enter') enviar()">
        <button onclick="enviar()">Enviar</button>
    </div>

    <script>
        async function enviar() {
            const input = document.getElementById('msgInput');
            const chat = document.getElementById('chat');
            const texto = input.value.trim();
            
            if (!texto) return;

            // COLOQUE SUA CHAVE APENAS AQUI DENTRO DAS ASPAS
            const MINHA_CHAVE = "AIzaSyCg3JGNmCpILxPjvm46QcVoqYRAk4j-pO4"; 

            // Mostra a mensagem do usuário na tela
            chat.innerHTML += `<div class="msg user">${texto}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            try {
                // URL OFICIAL v1 (Produção)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MINHA_CHAVE}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: texto }] }] })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const respostaIA = data.candidates[0].content.parts[0].text;
                    chat.innerHTML += `<div class="msg ai">${respostaIA}</div>`;
                } else {
                    throw new Error("Resposta vazia do Google.");
                }

            } catch (e) {
                console.error("Erro completo:", e);
                chat.innerHTML += `<div class="msg ai" style="color:red"><b>Erro no Sistema:</b> ${e.message}</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
