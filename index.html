<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TINZ Clinic - Oficial</title>
    <style>
        :root { --primaria: #14B8A6; --secundaria: #CCFBF1; }
        body { font-family: sans-serif; background-color: var(--secundaria); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--primaria); color: white; padding: 15px; text-align: center; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 12px; max-width: 80%; }
        .user { background: var(--primaria); color: white; align-self: flex-end; }
        .ai { background: white; color: #333; align-self: flex-start; border: 1px solid var(--primaria); }
        #input-area { padding: 20px; background: white; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        button { background: var(--primaria); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <header><strong>TINZ Clinic</strong></header>
    <div id="chat"><div class="msg ai">Olá! Teste agora o envio.</div></div>
    <div id="input-area">
        <input type="text" id="msgInput" placeholder="Digite aqui..." onkeypress="if(event.key==='Enter') enviar()">
        <button onclick="enviar()">Enviar</button>
    </div>

    <script>
        async function enviar() {
            const input = document.getElementById('msgInput');
            const chat = document.getElementById('chat');
            const texto = input.value.trim();
            if (!texto) return;

            // USE A CHAVE NOVA QUE VOCÊ CRIOU NO "NEW PROJECT"
            const MINHA_CHAVE = "AIzaSyAZEg5oAP7-yyNh0EjGNnaViElLk73_RvA"; 

            chat.innerHTML += `<div class="msg user">${texto}</div>`;
            input.value = '';

            try {
                // Rota direta SEM BIBLIOTECAS (mata o erro index.mjs)
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${MINHA_CHAVE}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: texto }] }] })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                const respostaIA = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="msg ai">${respostaIA}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg ai" style="color:red">Erro: ${e.message}</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
