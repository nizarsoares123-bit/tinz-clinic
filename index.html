<script type="module">
  import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

  // 1. COLE SUA CHAVE NOVA ABAIXO
  const API_KEY = "SUA_NOVA_CHAVE_AQUI"; 

  const genAI = new GoogleGenerativeAI(API_KEY);

  // 2. USANDO O MODELO FLASH 1.5 (VERSÃO ESTÁVEL)
  const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

  window.enviarMensagem = async function() {
    const input = document.getElementById('user-input');
    const container = document.getElementById('chat-container');
    const texto = input.value.trim();

    if (!texto) return;

    container.innerHTML += `<div class="message user-message">${texto}</div>`;
    input.value = '';
    container.scrollTop = container.scrollHeight;

    try {
      // Chamada direta
      const result = await model.generateContent(texto);
      const response = await result.response;
      const text = response.text();

      container.innerHTML += `<div class="message ai-message">${text}</div>`;
      container.scrollTop = container.scrollHeight;
    } catch (error) {
      console.error("Erro técnico:", error);
      container.innerHTML += `<div class="message ai-message">Erro: O Google recusou a conexão. Verifique se a API Generative Language está ativa no console.cloud.google.com</div>`;
    }
  }
</script>
