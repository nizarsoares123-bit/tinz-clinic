<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TINZ Clinic - Oficial</title>
    <style>
        :root { --primaria: #14B8A6; --secundaria: #CCFBF1; }
        body { font-family: sans-serif; background-color: var(--secundaria); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--primaria); color: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 12px; max-width: 80%; line-height: 1.4; }
        .user { background: var(--primaria); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: white; color: #333; align-self: flex-start; border: 1px solid var(--primaria); border-bottom-left-radius: 2px; }
        #input-area { padding: 20px; background: white; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; outline: none; }
        button { background: var(--primaria); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <header><strong>TINZ Clinic</strong><br><small>Assistente de Gestão em Saúde</small></header>
    <div id="chat"><div class="msg ai">Olá, Nizar! Sou o assistente da TINZ Clinic. Como posso ajudar?</div></div>
    <div id="input-area">
        <input type="text" id="msgInput" placeholder="Digite sua mensagem..." onkeypress="if(event.key==='Enter') enviar()">
        <button onclick="enviar()">Enviar</button>
    </div>

    <script>
        async function enviar() {
            const input = document.getElementById('msgInput');
            const chat = document.getElementById('chat');
            const texto = input.value.trim();
            if (!texto) return;

            // --- ESPAÇO DA CHAVE ---
            // PEGUE UMA CHAVE NOVA NO AI STUDIO (CREATE API KEY IN NEW PROJECT)
            const MINHA_CHAVE = "AIzaSyBSdk0HJHOK6XPzo3X9QcBjkYZJWqGdiiY"; 
            // -----------------------

            chat.innerHTML += `<div class="msg user">${texto}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            try {
                // Chamada direta para o servidor do Google (SEM BIBLIOTECAS EXTERNAS)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MINHA_CHAVE}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: texto }] }] })
                });

                const data = await response.json();

                if (data.error) throw new Error(data.error.message);

                const respostaIA = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="msg ai">${respostaIA}</div>`;
            } catch (e) {
                console.error("Erro:", e);
                chat.innerHTML += `<div class="msg ai" style="color:red">Erro: ${e.message}</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
