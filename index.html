<script type="module">
  // Usando um link direto e mais estável da biblioteca
  import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

  // --- CONFIGURAÇÃO DA CHAVE ---
  const API_KEY = "AIzaSyDLCrNJBlo8QlYP7LVUpsEE5RIW7RhNPqY"; 
  // -----------------------------

  const genAI = new GoogleGenerativeAI(API_KEY);

  // O SEGREDO: Vamos usar a URL de produção v1beta para evitar o erro 404
  const model = genAI.getGenerativeModel({ 
      model: "gemini-1.5-flash"
  });

  window.enviarMensagem = async function() {
    const input = document.getElementById('user-input');
    const container = document.getElementById('chat-container');
    const texto = input.value.trim();

    if (!texto) return;

    container.innerHTML += `<div class="message user-message">${texto}</div>`;
    input.value = '';
    container.scrollTop = container.scrollHeight;

    try {
      // Forçando a chamada para o modelo flash mais estável
      const result = await model.generateContent(texto);
      const response = await result.response;
      const respostaIA = response.text();

      container.innerHTML += `<div class="message ai-message">${respostaIA}</div>`;
      container.scrollTop = container.scrollHeight;
    } catch (error) {
      console.error("Erro detalhado:", error);
      container.innerHTML += `<div class="message ai-message">Erro 404: O Google não encontrou o modelo. Verifique se a API Generative Language está ativa no seu projeto do Google Cloud.</div>`;
    }
  }
</script>
